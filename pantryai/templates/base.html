<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PantryAI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M9 21V9"/>
            </svg>
            PantryAI
        </a>
        <ul class="nav-links">
            <li><a href="/pantry" class="{% if request.path == '/pantry' %}active{% endif %}">Pantry <span id="pantry-badge" class="badge" style="display:none"></span></a></li>
            <li><a href="/recipes" class="{% if request.path == '/recipes' %}active{% endif %}">Recipes</a></li>
            <li><a href="/grocery" class="{% if request.path == '/grocery' %}active{% endif %}">Grocery <span id="grocery-badge" class="badge" style="display:none"></span></a></li>
            <li><a href="/meals" class="{% if request.path == '/meals' %}active{% endif %}">Meal Planner</a></li>
        </ul>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
