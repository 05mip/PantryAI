<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PantryAI{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="PantryAI" class="nav-logo">
            PantryAI
        </a>
        <ul class="nav-links">
            <li><a href="/pantry" class="{% if request.path == '/pantry' %}active{% endif %}">Pantry <span id="pantry-badge" class="badge" style="display:none"></span></a></li>
            <li><a href="/recipes" class="{% if request.path == '/recipes' %}active{% endif %}">Recipes</a></li>
            <li><a href="/grocery" class="{% if request.path == '/grocery' %}active{% endif %}">Grocery <span id="grocery-badge" class="badge" style="display:none"></span></a></li>
            <li><a href="/meals" class="{% if request.path == '/meals' %}active{% endif %}">Meal Planner</a></li>
        </ul>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container" id="toast-container"></div>

    <!-- Chef Charlie Chat Widget -->
    <button id="chat-fab" title="Chat with Chef Charlie">
        👨‍🍳
        <span class="unread-dot"></span>
    </button>
    <div id="chat-panel">
        <div class="chat-header">
            <h3>👨‍🍳 Chef Charlie</h3>
            <div class="chat-header-actions">
                <button id="chat-clear" class="header-btn" title="New conversation">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </button>
                <button id="chat-close" class="close-btn" title="Minimize">&times;</button>
            </div>
        </div>
        <div id="chat-messages"></div>
        <form id="chat-form" class="chat-input-area" autocomplete="off">
            <input id="chat-input" type="text" placeholder="Ask Chef Charlie..." aria-label="Message">
            <button id="chat-send" type="submit" title="Send">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
