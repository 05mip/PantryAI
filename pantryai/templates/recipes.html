{% extends "base.html" %}
{% block title %}Recipes — PantryAI{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Recipes</h1>
    <div style="display:flex; gap:12px; align-items:center;">
        <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="recipe-search" placeholder="Search recipes...">
        </div>
        <button class="btn btn-primary" id="toggle-add-recipe">+ Add Recipe</button>
    </div>
</div>

<div class="inline-form" id="add-recipe-form">
    <div class="import-row">
        <div class="form-group" style="flex:1; margin-bottom:0;">
            <label>Import from URL</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="import-url" placeholder="https://www.allrecipes.com/recipe/..." style="flex:1">
                <button class="btn btn-secondary" id="import-url-btn" type="button">Import</button>
            </div>
        </div>
    </div>
    <div id="import-status" style="display:none; padding:8px 0; font-size:0.85rem;"></div>
    <hr style="border:none; border-top:1px solid var(--border); margin:12px 0;">
    <div class="form-row">
        <div class="form-group" style="flex:2">
            <label>Title</label>
            <input type="text" id="recipe-title" placeholder="e.g. Chicken Stir Fry">
        </div>
        <div class="form-group" style="flex:1">
            <label>Cuisine</label>
            <input type="text" id="recipe-cuisine" placeholder="e.g. Chinese">
        </div>
        <div class="form-group" style="flex:0.5">
            <label>Prep (min)</label>
            <input type="number" id="recipe-prep" value="30" min="0">
        </div>
        <div class="form-group" style="flex:0.5">
            <label>Servings</label>
            <input type="number" id="recipe-servings" value="4" min="1">
        </div>
    </div>
    <div class="form-group">
        <label>Ingredients (one per line: name, or quantity unit name)</label>
        <textarea id="recipe-ingredients" rows="5" placeholder="2 cups rice&#10;1 lb chicken breast&#10;3 cloves garlic&#10;soy sauce"></textarea>
    </div>
    <div class="form-group">
        <label>Instructions</label>
        <textarea id="recipe-instructions" rows="4" placeholder="Step-by-step instructions..."></textarea>
    </div>
    <input type="hidden" id="recipe-image-url" value="">
    <button class="btn btn-primary" id="save-recipe-btn">Save Recipe</button>
</div>

<div class="tabs">
    <button class="tab active" data-tab="matches">What I Can Make</button>
    <button class="tab" data-tab="near">Near Matches (1-4 away)</button>
</div>

<div class="filter-row">
    <label>Cuisine:</label>
    <select id="filter-cuisine">
        <option value="">All</option>
    </select>
    <div id="filter-missing-wrap" style="display:none;">
        <label>Max missing:</label>
        <input type="range" id="filter-missing" min="1" max="4" value="4" style="width:100px;">
        <span id="missing-val">4</span>
    </div>
    <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input type="checkbox" id="filter-favs"> Favorites first
    </label>
</div>

<div class="recipe-grid" id="recipe-grid"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/recipes.js') }}"></script>
{% endblock %}
